<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoalTracker - Добавить цель</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="index.html">Главная</a></li>
          <li><a href="form.html" class="active">Добавить цель</a></li>
          <li><a href="about.html">О проекте</a></li>
          <li><a href="stats.html">Статистика</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h1><i class="fas fa-bullseye"></i> Добавить новую цель</h1>
      <form id="goalForm">
        <div class="form-group">
          <label for="title">Название цели:</label>
          <input type="text" id="title" name="title" required />
        </div>
        <div class="form-group">
          <label for="category">Категория:</label>
          <select id="category" name="category" required>
            <option value="">Выберите категорию</option>
            <option value="Study">Study</option>
            <option value="Sport">Sport</option>
            <option value="Health">Health</option>
            <option value="Finance">Finance</option>
            <option value="Self-development">Self-development</option>
          </select>
        </div>
        <div class="form-group">
          <label for="deadline">Дедлайн:</label>
          <input type="date" id="deadline" name="deadline" required />
        </div>
        <div class="form-group">
          <label for="priority">Приоритет:</label>
          <select id="priority" name="priority" required>
            <option value="">Выберите приоритет</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="progressRange"
            >Прогресс (%): <span id="progressValue">0%</span></label
          >
          <input
            type="range"
            id="progressRange"
            name="progress"
            min="0"
            max="100"
            value="0"
            class="progress-slider"
            required
          />
        </div>
        <div class="form-group">
          <label for="description">Описание:</label>
          <textarea id="description" name="description" rows="4"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit"><i class="fas fa-plus"></i> Сохранить</button>
          <a href="index.html" class="cancel-btn">Отмена</a>
        </div>
      </form>
    </main>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/form.js"></script>
  </body>
</html>
